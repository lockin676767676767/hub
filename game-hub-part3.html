    <style>
:root {
  --primary-color: #6366f1;
  --primary-dark: #4f46e5;
  --secondary-color: #ec4899;
  --bg-light: #f8fafc;
  --bg-dark: #0f172a;
  --bg-card-light: #ffffff;
  --bg-card-dark: #1e293b;
  --text-light: #334155;
  --text-dark: #f1f5f9;
  --border-light: #e2e8f0;
  --border-dark: #334155;
}

body {
  --bg: var(--bg-light);
  --bg-card: var(--bg-card-light);
  --text: var(--text-light);
  --border: var(--border-light);
}

body.dark-theme {
  --bg: var(--bg-dark);
  --bg-card: var(--bg-card-dark);
  --text: var(--text-dark);
  --border: var(--border-dark);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  scroll-behavior: smooth;
}

body {
  background-color: var(--bg);
  color: var(--text);
  transition: background-color 0.3s ease;
  line-height: 1.6;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.header {
  background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
  color: white;
  padding: 1.5rem 0;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1.5rem;
}

.logo {
  font-size: 1.8rem;
  font-weight: 800;
}

.nav {
  display: flex;
  gap: 2rem;
}

.nav-link {
  color: white;
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.3s ease;
}

.nav-link:hover {
  opacity: 0.8;
}

.section {
  padding: 3rem 0;
  background: var(--bg);
}

.section-title {
  font-size: 2rem;
  margin-bottom: 2rem;
  color: var(--text);
  font-weight: 700;
}

.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem;
}

.game-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.game-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
}

.game-image {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
  display: flex;
  align-items: center;
  justify-content: center;
}

.placeholder-image {
  font-size: 4rem;
}

.game-info {
  padding: 1.5rem;
}

.game-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.game-description {
  font-size: 0.9rem;
  color: var(--text);
  opacity: 0.8;
  margin-bottom: 1rem;
}

.game-meta {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.game-tag {
  background: var(--primary-color);
  color: white;
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}

.game-actions {
  display: flex;
  gap: 0.5rem;
}

.btn {
  padding: 0.6rem 1rem;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  flex: 1;
}

.btn-primary {
  background: var(--primary-color);
  color: white;
}

.btn-primary:hover {
  background: var(--primary-dark);
}

.favorite-btn {
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  flex: 1;
  padding: 0.6rem 1rem;
}

.favorite-btn:hover {
  background: var(--primary-dark);
}

.favorite-btn input {
  cursor: pointer;
  accent-color: white;
  width: 1.1rem;
  height: 1.1rem;
  margin-right: 0.3rem;
}

/* FAVORITES SECTION */
.section-favorites {
  background: linear-gradient(135deg, rgba(236, 72, 153, 0.05), rgba(99, 102, 241, 0.05));
}

.favorites-message {
  text-align: center;
  padding: 2rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  opacity: 0.7;
}

.footer {
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 2rem 0;
  text-align: center;
  color: var(--text);
  margin-top: 3rem;
}

@media (max-width: 768px) {
  .games-grid {
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
  .game-actions {
    flex-direction: column;
  }
  .btn {
    width: 100%;
  }
}

        // THEME SWITCHING
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.classList.toggle('dark-theme', savedTheme === 'dark');

        // RENDER GAMES
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = games.map(game => `
                <div class="game-card">
                    <div class="game-image"><div class="placeholder-image">${game.emoji}</div></div>
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-description">${game.description}</p>
                        <div class="game-meta">${game.tags.map(tag => `<span class="game-tag">${tag}</span>`).join('')}</div>
                        <div class="game-actions">
                            <a href="${game.link}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Launch</a>
                            <form class="favorite-form" style="margin: 0; flex: 1;">
                                <label class="favorite-btn" style="display: flex; align-items: center; justify-content: center;">
                                    <input type="checkbox" class="favorite-checkbox" data-title="${game.title}" data-link="${game.link}" />⭐
                                </label>
                            </form>
                        </div>
                    </div>
                </div>
            `).join('');

            attachFavoriteListeners();
        }

        // FAVORITES SYSTEM
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        function attachFavoriteListeners() {
            document.querySelectorAll('.favorite-checkbox').forEach(checkbox => {
                const gameTitle = checkbox.dataset.title;

                if (favorites.some(fav => fav.title === gameTitle)) {
                    checkbox.checked = true;
                }

                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        favorites.push({
                            title: gameTitle,
                            link: checkbox.dataset.link
                        });
                    } else {
                        favorites = favorites.filter(fav => fav.title !== gameTitle);
                    }
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    renderFavorites();
                });
            });
        }

        function renderFavorites() {
            const favoritesGrid = document.getElementById('favoritesGrid');
            const favoritesMessage = document.getElementById('favoritesMessage');

            if (favorites.length === 0) {
                favoritesGrid.innerHTML = '';
                favoritesMessage.style.display = 'block';
            } else {
                favoritesMessage.style.display = 'none';
                favoritesGrid.innerHTML = favorites.map(fav => {
                    const game = games.find(g => g.title === fav.title);
                    return `
                        <div class="game-card">
                            <div class="game-image"><div class="placeholder-image">${game.emoji}</div></div>
                            <div class="game-info">
                                <h3 class="game-title">${game.title}</h3>
                                <p class="game-description">${game.description}</p>
                                <div class="game-meta">${game.tags.map(tag => `<span class="game-tag">${tag}</span>`).join('')}</div>
                                <div class="game-actions">
                                    <a href="${game.link}" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Launch</a>
                                    <button class="btn" style="background: var(--primary-color); color: white;" onclick="removeFavorite('${game.title}')">❌</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function removeFavorite(title) {
            favorites = favorites.filter(fav => fav.title !== title);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderFavorites();
            renderGames();
        }

        renderGames();
        renderFavorites();
