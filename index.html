<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PigHead</title>
  <style>

    body {
      font-family: Ubuntu
, sans-serif;
      background-image: url("https://static.vecteezy.com/system/resources/previews/041/854/334/non_2x/black-and-white-abstract-organic-shapes-pattern-background-in-trendy-retro-style-illustration-vector.jpg");
      padding: 20px;
      color: white;
    }
    
    h1{
    text-shadow: -2px 0 black, 0 2px black, 2px 0 black, 0 -2px black;
    }
    .container {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .box {
      background: 	black;
      border-radius: 8px;
      padding: 15px;
      width: 260px;
      color: black;
      border: solid;
      border-color: black;
      box-shadow:0 10px 20px rgba(255,255,255,0.4);
      background-image: url("https://static.vecteezy.com/system/resources/previews/041/854/334/non_2x/black-and-white-abstract-organic-shapes-pattern-background-in-trendy-retro-style-illustration-vector.jpg");
    }

    .box h3 {
      margin: 0 0 3px;
      font-family: Ubuntu;
    }

    .box p {
      font-size: 18px;
      color: black;
    }

    .box button {
      display:inline-block;
      padding:14px 28px;
      background:black;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

   .box button::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.25);
      transition:0.5s;
    }

    .box button:hover::before{
      left:100%;
    }

    .box button:hover{
      transform:translateY(-5px) scale(1.05);
      box-shadow:0 10px 20px rgba(255,255,255,0.4);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    @keyframes slideUp{
      from{
        transform:translateY(40px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
  </style>
</head>
<body>

<h1 style="text-align:center">PigHead </h1>
 

<div class="container" id="boxContainer"></div>

<script type="application/json" id="linkData">
[
  
  {
    "name": "Balatro",
    "description": "",
    "url": "https://raw.githubusercontent.com/9kwngxqj4q-stack/Balatro/refs/heads/main/balatro.html"
  },
  {
    "name": "Minecraft",
    "description": "",
    "url": "https://raw.githubusercontent.com/arcimiedies/nothing-to-see-here/refs/heads/main/UGS-Files/EaglercraftZ_1.11.2.html"
  }
]
</script>

<script>
  const data = JSON.parse(document.getElementById("linkData").textContent);
  const container = document.getElementById("boxContainer");

  data.forEach(item => {
    const box = document.createElement("div");
    box.className = "box";

    box.innerHTML = `
      <h3>${item.name}</h3>
      <p>${item.description}</p>
      <button>Open</button>
    `;

    box.querySelector("button").onclick = async () => {
      try {
        const res = await fetch(item.url);
        if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);

        let html = await res.text();

        const baseHref = item.url.slice(0, item.url.lastIndexOf('/') + 1);

        if (/<head[^>]*>/i.test(html)) {
          html = html.replace(
            /<head([^>]*)>/i,
            `<head$1><base href="${baseHref}">`
          );
        } else {
          html = `<head><base href="${baseHref}"></head>` + html;
        }

        const w = window.open("about:blank");
        if (!w) throw new Error("Popup blocked");

        w.document.open();
        w.document.write(html);
        w.document.close();

      } catch (err) {
        console.error(err);
        alert("Failed to load page: " + err.message);
      }
    };

    container.appendChild(box);
  });
</script>

</body>
</html>
