         /* =========================
         RESET + ROOT VARIABLES
         ========================= */
         * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         }
         :root {
         --bg: #0b0b12;
         --card: rgba(20, 20, 35, 0.7);
         --border: rgba(168, 85, 247, 0.25);
         --text: #ffffff;
         --muted: #cbd5e1;
         --accent1: #a855f7;
         --accent2: #6366f1;
         }
         /* =========================
         GLOBAL TRANSITIONS
         ========================= */
         body,
         .box,
         .sidebar,
         .genre-btn,
         .theme-btn {
         transition:
         background 0.35s ease,
         color 0.35s ease,
         border-color 0.35s ease;
         }
         /* =========================
         BODY
         ========================= */
         body {
         font-family:
         "DM Sans",
         system-ui,
         -apple-system,
         sans-serif;
         min-height: 100vh;
         display: flex;
         background: var(--bg);
         color: var(--text);
         -webkit-font-smoothing: antialiased;
         -moz-osx-font-smoothing: grayscale;
         transition:
         background 0.5s ease,
         color 0.5s ease;
         }
         /* =========================
         LAYOUT: SIDEBAR + MAIN
         ========================= */
         .sidebar {
         width: 270px;
         padding: 20px;
         position: sticky;
         top: 0;
         height: 100vh;
         background: var(--card);
         backdrop-filter: blur(14px);
         border-right: 1px solid var(--border);
         display: flex;
         flex-direction: column;
         gap: 12px;
         }
         .logo {
         font-size: 1.8rem;
         font-weight: 800;
         background: linear-gradient(135deg, var(--accent1), var(--accent2));
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         }
         .main {
         flex: 1;
         padding: 35px;
         }
         /* =========================
         HEADER + SEARCH
         ========================= */
         .header h1 {
         font-size: 3rem;
         font-weight: 800;
         }
         .header p {
         color: var(--muted);
         margin-top: 8px;
         }
         .search {
         padding: 12px;
         border-radius: 12px;
         border: 1px solid var(--border);
         outline: none;
         background: rgba(0, 0, 0, 0.25);
         color: var(--text);
         }
         /* =========================
         GENRES FILTER
         ========================= */
         .genres {
         display: flex;
         flex-wrap: wrap;
         gap: 6px;
         }
         .genre-btn {
         padding: 6px 10px;
         border-radius: 999px;
         border: 1px solid var(--border);
         cursor: pointer;
         font-size: 0.75rem;
         background: rgba(0, 0, 0, 0.2);
         color: var(--muted);
         transition:
         transform 0.12s ease,
         border-color 0.2s ease,
         background 0.2s ease;
         }
         .genre-btn:hover {
         transform: translateY(-2px) scale(1.03);
         border-color: var(--accent1);
         }
         .genre-btn.active {
         background: linear-gradient(135deg, var(--accent1), var(--accent2));
         color: var(--text);
         border: none;
         }
         /* =========================
         GRID LAYOUT
         ========================= */
         .container {
         margin-top: 25px;
         display: grid;
         grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
         gap: 18px;
         }
         /* =========================
         GAME CARD (BOX)
         ========================= */
         .box {
         position: relative;
         overflow: hidden;
         display: flex;
         flex-direction: column;
         justify-content: space-between;
         min-height: 220px;
         padding: 18px;
         border-radius: 18px;
         border: 1px solid rgba(168, 85, 247, 0.2);
         background: rgba(20, 20, 35, 0.7);
         backdrop-filter: blur(10px);
         animation: cardPopIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
         transition:
         transform 0.25s ease,
         box-shadow 0.25s ease,
         filter 0.25s ease;
         }
         .box:hover {
         transform: translateY(-8px) scale(1.01);
         filter: brightness(1.15);
         border-color: var(--accent1);
         box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
         }
         /* card overlay */
         .box::before {
         content: "";
         position: absolute;
         inset: 0;
         background: linear-gradient(
         135deg,
         color-mix(in srgb, var(--accent1) 35%, transparent),
         color-mix(in srgb, var(--accent2) 25%, transparent),
         rgba(0, 0, 0, 0.55)
         );
         mix-blend-mode: multiply;
         opacity: 0.9;
         }
         /* keep content above overlay */
         .box * {
         position: relative;
         z-index: 1;
         }
         /* =========================
         CARD CONTENT TEXT
         ========================= */
         .box h3 {
         font-size: 1.2rem;
         margin-bottom: 6px;
         color: var(--cardText);
         }
         .box p {
         color: var(--cardText);
         font-size: 0.9rem;
         margin-bottom: 10px;
         }
         /* =========================
         TOP BAR + TAGS
         ========================= */
         .card-topbar {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: 8px;
         }
         .genre-tag {
         display: inline-block;
         font-size: 0.7rem;
         padding: 4px 8px;
         border-radius: 999px;
         border: 1px solid var(--border);
         color: var(--muted);
         background: color-mix(in srgb, var(--card) 100%, transparent);
         backdrop-filter: blur(8px);
         box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
         }
         /* =========================
         FAVORITE BUTTON
         ========================= */
         .favorite-btn {
         width: 22px;
         height: 22px;
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 14px;
         background: rgba(0, 0, 0, 0.25);
         border: 1px solid rgba(255, 255, 255, 0.15);
         color: rgba(255, 255, 255, 0.7);
         border-radius: 6px;
         cursor: pointer;
         backdrop-filter: blur(6px);
         transition:
         transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1),
         color 0.25s ease,
         background 0.25s ease,
         border-color 0.25s ease,
         box-shadow 0.25s ease;
         flex: 0 0 22px;
  		 box-sizing: border-box;
 		 line-height: 1;
         display: grid;
  		 place-items: center;
         }
         .favorite-btn:hover {
         transform: translateY(-2px) scale(1.03);
         border-color: var(--accent1);
         }
         .favorite-btn.active {
         color: #ffd54a;
         border-color: rgba(255, 213, 74, 0.6);
         background: rgba(255, 213, 74, 0.15);
         animation: favPop 0.3s ease;
         transform: scale(1.15);
         box-shadow: 0 0 10px rgba(255, 213, 74, 0.4);
         }
         .favorite-btn:active {
         transform: scale(0.85);
         }
         @keyframes favPop {
         0% {
         transform: scale(0.8);
         }
         60% {
         transform: scale(1.2);
         }
         100% {
         transform: scale(1.1);
         }
         }
         /* =========================
         FAVORITES LIST
         ========================= */
         .fav-item {
         display: block;
         padding: 8px;
         border-radius: 10px;
         border: 1px solid var(--border);
         background: rgba(0, 0, 0, 0.2);
         color: var(--muted);
         cursor: pointer;
         transition: 0.2s;
         }
         .fav-item:hover {
         transform: translateY(-2px) scale(1.03);
         border-color: var(--accent1);
         }
         /* =========================
         LAUNCH BUTTON
         ========================= */
         .box > button:not(.favorite-btn) {
         width: 100%;
         margin-top: auto;
         padding: 10px;
         border-radius: 10px;
         border: 1px solid var(--border);
         font-weight: 700;
         cursor: pointer;
         background: linear-gradient(135deg, var(--accent1), var(--accent2));
         color: var(--text);
         transition:
         transform 0.12s ease,
         filter 0.12s ease,
         box-shadow 0.12s ease;
         }
         .box > button:hover {
         transform: translateY(-4px) scale(1.01);
         filter: brightness(1.2);
         box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
         }
         .box > button:active {
         transform: translateY(2px) scale(0.98);
         filter: brightness(0.9);
         }
         /* =========================
         THEME BUTTONS
         ========================= */
         .theme-title {
         font-size: 0.8rem;
         color: #888;
         margin-top: 10px;
         }
         .themes {
         display: flex;
         flex-direction: column;
         gap: 6px;
         }
         .theme-btn {
         display: flex;
         align-items: center;
         gap: 6px;
         padding: 8px;
         border-radius: 10px;
         border: 1px solid var(--border);
         background: rgba(0, 0, 0, 0.2);
         color: var(--muted);
         cursor: pointer;
         transition:
         background 0.2s ease,
         color 0.2s ease,
         border-color 0.2s ease,
         transform 0.12s ease;
         }
         .theme-btn:hover {
         transform: translateY(-2px) scale(1.03);
         border-color: var(--accent1);
         }
         .theme-btn.active {
         background: linear-gradient(135deg, var(--accent1), var(--accent2));
         color: white;
         border: none;
         }
         .theme-btn:active {
         transform: scale(0.98);
         }
         /* =========================
         LOADING SCREEN
         ========================= */
         #loading-screen {
         position: fixed;
         inset: 0;
         display: flex;
         flex-direction: column;
         justify-content: center;
         align-items: center;
         background: rgba(5, 10, 20, 0.9);
         backdrop-filter: blur(10px);
         color: var(--text);
         font-size: 18px;
         z-index: 9999;
         opacity: 0;
         pointer-events: none;
         transition: opacity 0.25s ease;
         }
         #loading-screen.active {
         opacity: 1;
         pointer-events: all;
         }
         .loader {
         width: 50px;
         height: 50px;
         border: 4px solid rgba(255, 255, 255, 0.2);
         border-top: 4px solid var(--accent1);
         border-radius: 50%;
         animation: spin 1s linear infinite;
         margin-bottom: 12px;
         }
         @keyframes spin {
         to {
         transform: rotate(360deg);
         }
         }
         /* =========================
         FAVORITE POPUP
         ========================= */
         .favorite-popup {
         position: fixed;
         top: 20px;
         left: 50%;
         transform: translateX(-50%) scale(0.8);
         min-width: 90px;
         height: 36px;
         padding: 0 12px;
         display: flex;
         align-items: center;
         justify-content: center;
         border-radius: 14px;
         font-weight: 600;
         font-size: 0.85rem;
         background: var(--card);
         border: 1px solid var(--border);
         color: var(--text);
         backdrop-filter: blur(12px);
         box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
         opacity: 0;
         transition: all 0.25s ease;
         z-index: 9999;
         }
         .favorite-popup.show {
         opacity: 1;
         transform: translateX(-50%) scale(1);
         box-shadow:
         0 10px 25px rgba(0, 0, 0, 0.25),
         0 0 0 2px color-mix(in srgb, var(--accent1) 25%, transparent);
         }
         .favorite-popup.fade-out {
         opacity: 0;
         transform: translateX(-50%) translateY(10px);
         }
      </style>
   </head>

         /* =========================
         DOM ELEMENTS
         ========================= */
         const container = document.getElementById("boxContainer");
         const search = document.getElementById("search");
         const genreBar = document.getElementById("genreBar");
         const favoritesBar = document.getElementById("favoritesBar");
         const themeBtns = document.querySelectorAll(".theme-btn");
         
         /* =========================
         STATE
         ========================= */
         let activeGenre = "All";
         let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
         const MAX_FAVORITES = 5;
         
         /* =========================
         THEMES
         ========================= */
         const themes = {
         dark: {
         bg: "linear-gradient(135deg, #05060a, #0b0f1a, #120a1f)",
         card: "rgba(15, 15, 25, 0.8)",
         border: "rgba(120, 90, 255, 0.25)",
         text: "#ffffff",
         muted: "#a9b0c3",
         accent1: "#7c3aed",
         accent2: "#2563eb",
         overlay: "rgba(0, 0, 0, 0.55)",
         cardText: "#d3d3d3"
         },
         
         light: {
         bg: "linear-gradient(135deg, #f8fafc, #e2e8f0, #dbeafe)",
         card: "rgba(255, 255, 255, 0.8)",
         border: "rgba(0, 0, 0, 0.08)",
         text: "#0f172a",
         muted: "#475569",
         accent1: "#3b82f6",
         accent2: "#6366f1",
         overlay: "rgba(255, 255, 255, 0.55)",
         cardText: "#ffffff"
         }
         };
         
         /* =========================
         THEME SYSTEM
         ========================= */
         function applyTheme(name) {
            const t = themes[name] || themes.void;
            const root = document.documentElement;
         
         const vars = {
               "--bg": t.bg,
               "--card": t.card,
               "--border": t.border,
               "--text": t.text,
               "--muted": t.muted,
               "--accent1": t.accent1,
               "--accent2": t.accent2,
               "--overlay": t.overlay,
               "--cardText": t.cardText,
            };
         
            Object.entries(vars).forEach(([k, v]) =>
               root.style.setProperty(k, v),
            );
         
            localStorage.setItem("theme", name);
         
            themeBtns.forEach((b) => b.classList.remove("active"));
            document
               .querySelector(`[data-theme="${name}"]`)
               ?.classList.add("active");
         }
         
         function getPreferredTheme() {
            const saved = localStorage.getItem("theme");
            if (saved && themes[saved]) return saved;
         
            const prefersDark = window.matchMedia(
               "(prefers-color-scheme: dark)",
            ).matches;
            return prefersDark ? "dark" : "light";
         }
         
         themeBtns.forEach((btn) => {
            btn.onclick = () => applyTheme(btn.dataset.theme);
         });
         
         /* =========================
         FAVORITES
         ========================= */
         function saveFavorites() {
            localStorage.setItem("favorites", JSON.stringify(favorites));
            renderFavorites();
         }
         
         function toggleFavorite(item) {
            const index = favorites.findIndex((f) => f.name === item.name);
         
            if (index === -1) {
               if (favorites.length >= MAX_FAVORITES) {
                  showFavoriteLimitPopup();
                  return;
               }
               favorites.push(item);
            } else {
               favorites.splice(index, 1);
            }
         
            saveFavorites();
         }
         
         function renderFavorites() {
            favoritesBar.innerHTML = "";
         
            if (!favorites.length) {
               favoritesBar.innerHTML = `<div style="color:#777;font-size:0.8rem;">No favorites yet</div>`;
               return;
            }
         
            favorites.forEach((item) => {
               const btn = document.createElement("button");
               btn.className = "fav-item";
               btn.textContent = item.name;
               btn.onclick = () => openGame(item.url);
               favoritesBar.appendChild(btn);
            });
         }
         
         function updateFavoriteUI() {
            renderFavorites();
         
            document.querySelectorAll(".box").forEach((box) => {
               const name = box.querySelector("h3").textContent;
               const btn = box.querySelector(".favorite-btn");
               const isFav = favorites.some((f) => f.name === name);
               btn.classList.toggle("active", isFav);
            });
         }
         
         function showFavoriteLimitPopup() {
            const popup = document.createElement("div");
            popup.className = "favorite-popup";
            popup.textContent = "Limit";
         
            document.body.appendChild(popup);
         
            setTimeout(() => popup.classList.add("show"), 10);
         
            setTimeout(() => {
               popup.classList.remove("show");
               setTimeout(() => popup.remove(), 300);
            }, 2000);
         }
         
         /* =========================
         GAME LAUNCHER
         ========================= */
         function openGame(url) {
            const loader = document.getElementById("loading-screen");
         
            loader.classList.add("active");
         
            setTimeout(() => {
               fetch(url)
                  .then((res) => res.text())
                  .then((html) => {
                     const base = url.slice(0, url.lastIndexOf("/") + 1);
         
                     if (/<head/i.test(html)) {
                        html = html.replace(
                           /<head([^>]*)>/i,
                           `<head$1><base href="${base}">`,
                        );
                     } else {
                        html = `<head><base href="${base}"></head>` + html;
                     }
         
                     const w = window.open("about:blank");
                     w.document.write(html);
                     w.document.close();
         
                     loader.classList.remove("active");
                  })
                  .catch(() => {
                     loader.classList.remove("active");
                     alert("Failed to load game.");
                  });
            }, 400);
         }
         
         /* =========================
         GENRES
         ========================= */
         const genres = ["All", ...new Set(data.map((g) => g.genre))];
         
         genres.forEach((g) => {
            const btn = document.createElement("button");
            btn.className = "genre-btn";
            btn.textContent = g;
         
            if (g === "All") btn.classList.add("active");
         
            btn.onclick = () => {
               document
                  .querySelectorAll(".genre-btn")
                  .forEach((b) => b.classList.remove("active"));
         
               btn.classList.add("active");
               activeGenre = g;
               applyFilters();
            };
         
            genreBar.appendChild(btn);
         });
         
         /* =========================
         RENDER + LAZY LOAD
         ========================= */
         function render(list) {
            container.innerHTML = "";
         
            list.forEach((item, i) => {
               const box = document.createElement("div");
               box.className = "box";
               box.style.animationDelay = `${i * 0.05}s`;
               box.dataset.image = item.image;
               box.style.background = `rgba(20,20,35,0.7)`;
         
               const isFav = favorites.some((f) => f.name === item.name);
         
               box.innerHTML = `
            <div class="top">
                <div class="card-topbar">
                    <div class="genre-tag">${item.genre}</div>
                    <button class="favorite-btn ${isFav ? "active" : ""}">★</button>
                </div>
         
                <h3>${item.name}</h3>
                <p>${item.description}</p>
            </div>
         
            <button class="launch-btn">Launch Game</button>
         `;
         
               box.querySelector(".favorite-btn").onclick = (e) => {
                  e.stopPropagation();
                  toggleFavorite(item);
                  updateFavoriteUI();
               };
         
               box.querySelector(".launch-btn").onclick = () => {
                  openGame(item.url);
               };
         
               container.appendChild(box);
            });
         
            lazyLoadImages();
         }
         
         function lazyLoadImages() {
            const boxes = document.querySelectorAll(".box");
         
            const observer = new IntersectionObserver(
               (entries, obs) => {
                  entries.forEach((entry) => {
                     if (!entry.isIntersecting) return;
         
                     const box = entry.target;
                     const img = box.dataset.image;
         
                     if (img) {
                        box.style.background = `
                        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                        url(${img})
                    `;
                        box.style.backgroundSize = "cover";
                        box.style.backgroundPosition = "center";
                     }
         
                     obs.unobserve(box);
                  });
               },
               { rootMargin: "200px" },
            );
         
            boxes.forEach((box) => observer.observe(box));
         }
         
         /* =========================
         FILTERS
         ========================= */
         function applyFilters() {
            const q = search.value.toLowerCase();
         
            const filtered = data.filter((item) => {
               const match =
                  item.name.toLowerCase().includes(q) ||
                  item.description.toLowerCase().includes(q) ||
                  item.genre.toLowerCase().includes(q);
         
               const genreMatch =
                  activeGenre === "All" || item.genre === activeGenre;
         
               return match && genreMatch;
            });
         
            render(filtered);
         }
         
         search.addEventListener("input", applyFilters);
         
         /* =========================
         INIT
         ========================= */
         applyTheme(getPreferredTheme());
         renderFavorites();
         render(data);
      </script>
   </body>
</html>
