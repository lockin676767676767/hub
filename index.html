      <meta charset="UTF-8" />

         href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
         rel="stylesheet"
      />

      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         body {
            font-family: "Inter", sans-serif;
            min-height: 100vh;
            display: flex;

            /* PURPLE + DARK GREY THEME */
            background: linear-gradient(135deg, #0b0b12, #141427, #1a1330);
            color: #ffffff;
         }

         /* SIDEBAR */
         .sidebar {
            width: 270px;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;

            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(14px);

            border-right: 1px solid rgba(168, 85, 247, 0.25);

            display: flex;
            flex-direction: column;
            gap: 12px;
         }

         .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         /* SEARCH */
         .search {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(168, 85, 247, 0.25);
            outline: none;

            background: rgba(0, 0, 0, 0.3);
            color: white;
         }

         /* GENRES */
         .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
         }

         .genre-btn {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(168, 85, 247, 0.25);
            cursor: pointer;
            font-size: 0.75rem;

            background: rgba(0, 0, 0, 0.2);
            color: #cbd5e1;

            transition: 0.2s;
         }

         .genre-btn:hover {
            transform: translateY(-2px);
            border-color: #a855f7;
         }

         .genre-btn.active {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            border: none;
         }

         /* MAIN */
         .main {
            flex: 1;
            padding: 35px;
         }

         .header h1 {
            font-size: 3rem;
            font-weight: 800;
         }

         .header p {
            color: #cbd5e1;
            margin-top: 8px;
         }

         /* GRID */
         .container {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
         }

         /* CARD */
         .box {
            background: rgba(20, 20, 35, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 18px;
            padding: 18px;

            backdrop-filter: blur(10px);

            transition: 0.25s;
         }

         .box:hover {
            transform: translateY(-6px);
            border-color: #a855f7;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.15);
         }

         .box h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
         }

         .box p {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 10px;
         }
         .box {
            position: relative;
            overflow: hidden;
         }

         /* dark overlay */
         .box::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
         }

         /* keep text above overlay */
         .box * {
            position: relative;
            z-index: 1;
         }
         .genre-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 999px;
            margin-bottom: 8px;

            background: rgba(168, 85, 247, 0.15);
            color: #c4b5fd;
            border: 1px solid rgba(168, 85, 247, 0.25);
         }

         /* BUTTON */
         .box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;

            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
         }

         .box button:hover {
            filter: brightness(1.1);
         }
         .box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            min-height: 220px;
         }
         .box button {
            margin-top: auto;
         }
      </style>
   </head>

         const container = document.getElementById("boxContainer");
         const search = document.getElementById("search");
         const genreBar = document.getElementById("genreBar");

         let activeGenre = "All";
         let boxes = [];

         /* GENRES */
         const genres = ["All", ...new Set(data.map((g) => g.genre))];

         genres.forEach((g) => {
            const btn = document.createElement("button");
            btn.className = "genre-btn";
            btn.textContent = g;

            if (g === "All") btn.classList.add("active");

            btn.onclick = () => {
               document
                  .querySelectorAll(".genre-btn")
                  .forEach((b) => b.classList.remove("active"));
               btn.classList.add("active");
               activeGenre = g;
               applyFilters();
            };

            genreBar.appendChild(btn);
         });

         /* RENDER */
         function render(list) {
            container.innerHTML = "";
            boxes = [];

            list.forEach((item) => {
               const box = document.createElement("div");
               box.className = "box";

               box.style.background = `
  linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url(${item.image})
`;
               box.style.backgroundSize = "cover";
               box.style.backgroundPosition = "center";
               box.style.backgroundRepeat = "no-repeat";
               box.innerHTML = `
  <div class="top">
    <div class="genre-tag">${item.genre}</div>
    <h3>${item.name}</h3>
    <p>${item.description}</p>
  </div>

  <button>Launch Game</button>
`;

               const button = box.querySelector("button");

               button.onclick = async () => {
                  const res = await fetch(item.url);
                  let html = await res.text();

                  const base = item.url.slice(0, item.url.lastIndexOf("/") + 1);

                  if (/<head/i.test(html)) {
                     html = html.replace(
                        /<head([^>]*)>/i,
                        `<head$1><base href="${base}">`,
                     );
                  } else {
                     html = `<head><base href="${base}"></head>` + html;
                  }

                  const w = window.open("about:blank");
                  w.document.write(html);
                  w.document.close();
               };

               container.appendChild(box);
               boxes.push({ box, item });
            });
         }

         /* FILTER */
         function applyFilters() {
            const q = search.value.toLowerCase();

            boxes.forEach(({ box, item }) => {
               const match =
                  item.name.toLowerCase().includes(q) ||
                  item.description.toLowerCase().includes(q) ||
                  item.genre.toLowerCase().includes(q);

               const ok = activeGenre === "All" || item.genre === activeGenre;

               box.style.display = match && ok ? "block" : "none";
            });
         }

         search.addEventListener("input", applyFilters);

         render(data);
      </script>
